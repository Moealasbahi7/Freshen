    .logo-dot { width:10px; height:10px; background:var(--gl); border-radius:50%; }
    .back-btn { color:var(--dark); text-decoration:none; font-size:0.88rem; opacity:0.6; transition:opacity 0.2s; }
    .back-btn:hover { opacity:1; color:var(--g); }

    /* Hero */
    .hero { background:linear-gradient(135deg,rgba(90,138,31,0.07),rgba(122,181,42,0.03)); border-bottom:0.5px solid rgba(90,138,31,0.1); padding:2.5rem 3rem; }
    .hero-inner { max-width:780px; margin:0 auto; display:grid; grid-template-columns:auto 1fr; gap:2rem; align-items:center; }
    .hero-emoji { font-size:5rem; line-height:1; }
    .hero-title { font-family:'Playfair Display',serif; font-size:2.2rem; font-weight:700; margin-bottom:0.5rem; }
    .hero-desc { font-size:0.92rem; opacity:0.65; line-height:1.7; margin-bottom:1rem; }
    .hero-tags { display:flex; gap:0.5rem; flex-wrap:wrap; }
    .tag { background:#fff; border:0.5px solid var(--border); padding:0.3rem 0.8rem; border-radius:100px; font-size:0.75rem; font-weight:500; }
    .tag.green { background:rgba(90,138,31,0.1); border-color:rgba(90,138,31,0.2); color:var(--g); }

    .page { max-width:780px; margin:0 auto; padding:2rem 3rem 4rem; }

    /* Nutrition cards */
    .nutri-row { display:grid; grid-template-columns:repeat(4,1fr); gap:0.7rem; margin-bottom:2rem; }
    .nutri-box { background:#fff; border-radius:14px; padding:0.9rem; border:0.5px solid var(--border); text-align:center; }
    .nutri-val { font-family:'Playfair Display',serif; font-size:1.4rem; font-weight:700; color:var(--g); }

    .servings-label { font-size:0.9rem; font-weight:500; }
    .servings-hint { font-size:0.78rem; opacity:0.5; }
    .srv-ctrl { display:flex; align-items:center; gap:0.8rem; }
    .srv-btn { width:36px; height:36px; border-radius:50%; border:none; background:var(--g); color:#fff; font-size:1.3rem; font-weight:300; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background 0.2s, transform 0.1s; line-height:1; user-select:none; }
    .srv-btn:hover { background:var(--gd); transform:scale(1.08); }
    .srv-btn:active { transform:scale(0.95); }
    .srv-num { font-family:'Playfair Display',serif; font-size:1.6rem; font-weight:700; min-width:30px; text-align:center; }

    .block-hint { font-size:0.82rem; opacity:0.5; margin-bottom:1rem; }
    .ing-grid { display:grid; grid-template-columns:1fr 1fr; gap:0.6rem; margin-bottom:2rem; }

    .ing-emoji { font-size:1.4rem; flex-shrink:0; }
    .ing-text { min-width:0; }
    .ing-name { font-size:0.85rem; font-weight:500; }
    .ing-qty { font-size:0.78rem; color:var(--g); font-weight:600; margin-top:0.1rem; }

    /* Steps */
    .steps-list { display:grid; gap:0.8rem; margin-bottom:2rem; }
    .step-item { display:grid; grid-template-columns:40px 1fr; gap:1rem; align-items:start; cursor:pointer; }
    .step-num { width:40px; height:40px; border-radius:50%; background:var(--g); color:#fff; font-family:'Playfair Display',serif; font-size:1rem; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:background 0.2s; }
    .step-item.done .step-num { background:rgba(90,138,31,0.2); color:var(--g); }
    .step-body { background:#fff; border-radius:14px; padding:1rem 1.2rem; border:0.5px solid var(--border); transition:opacity 0.2s; }
    .step-item.done .step-body { opacity:0.5; }
    .step-title { font-size:0.85rem; font-weight:600; color:var(--g); margin-bottom:0.35rem; }
    .step-text { font-size:0.88rem; line-height:1.65; opacity:0.85; }
    .step-time { font-size:0.74rem; color:var(--warn); font-weight:500; margin-top:0.5rem; }

    .tips-box { background:rgba(90,138,31,0.06); border:0.5px solid rgba(90,138,31,0.15); border-radius:14px; padding:1.2rem 1.4rem; margin-bottom:2rem; }
    .tips-title { font-size:0.78rem; font-weight:600; color:var(--g); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:0.7rem; }
    .tip-item { font-size:0.84rem; opacity:0.8; line-height:1.6; display:flex; gap:0.6rem; margin-bottom:0.4rem; }
    .tip-item:last-child { margin-bottom:0; }

    /* Add button */
    .add-btn-wrap { position:sticky; bottom:1.5rem; }
    .add-btn { width:100%; background:var(--g); color:#fff; border:none; padding:1rem 2rem; border-radius:100px; font-family:'DM Sans',sans-serif; font-size:0.95rem; font-weight:500; cursor:pointer; transition:background 0.2s,transform 0.15s; box-shadow:0 8px 24px rgba(90,138,31,0.35); }
    .add-btn:hover { background:var(--gd); transform:translateY(-2px); }
    .add-btn:active { transform:translateY(0); }

    .toast { position:fixed; bottom:2rem; right:2rem; background:var(--dark); color:#fff; padding:0.9rem 1.5rem; border-radius:12px; font-size:0.88rem; z-index:9999; opacity:0; transform:translateY(12px); transition:all 0.3s; pointer-events:none; }

    @media (max-width:768px) {
      nav { padding:1rem 1.5rem; }
      .hero { padding:1.5rem; }
      .hero-inner { grid-template-columns:1fr; gap:0.8rem; }
      .hero-emoji { font-size:3rem; }
      .page { padding:1.5rem; }
      .nutri-row { grid-template-columns:repeat(2,1fr); }
      .ing-grid { grid-template-columns:1fr; }
    }
  </style>
</head>

  let servings = recipe ? recipe.base : 2;
  const BASE   = recipe ? recipe.base : 2;

  if (!recipe) {
    document.getElementById('heroTitle').textContent = 'Recette introuvable';
    document.getElementById('heroDesc').textContent  = 'Retournez au journal et choisissez un aliment.';
  } else {
    buildPage();
  }

  function buildPage() {
    document.title = `Freshen — ${foodName}`;
    document.getElementById('heroEmoji').textContent = recipe.emoji;
    document.getElementById('heroTitle').textContent = foodName;
    document.getElementById('heroDesc').textContent  = recipe.desc;
    document.getElementById('heroTags').innerHTML    = recipe.tags.map(t =>
      `<span class="tag ${t.includes('NOVA 1') ? 'green' : ''}">${t}</span>`).join('');

    // Nutrition
    document.getElementById('nutriRow').innerHTML = [
      {val: recipe.nutri.kcal,    label: 'Kcal / portion'},
      {val: recipe.nutri.protein+'g', label: 'Protéines'},
      {val: recipe.nutri.sugar+'g',   label: 'Sucres'},
      {val: recipe.nutri.fiber+'g',   label: 'Fibres'},
    ].map(n => `
      <div class="nutri-box">
        <div class="nutri-val">${n.val}</div>
        <div class="nutri-label">${n.label}</div>
      </div>`).join('');

    // Initial render
    document.getElementById('srvNum').textContent = servings;
    renderIngredients();
    renderSteps();
    renderTips();
  }

  // ── SERVINGS ─────────────────────────────────────────────────
  function renderIngredients() {
    const ratio = servings / BASE;
    document.getElementById('ingGrid').innerHTML = recipe.ingredients.map((ing, i) => {
      let qty = '';
      if (ing.qty) {
        const val = Math.round(ing.qty * ratio * 10) / 10;
        qty = val + (ing.unit ? ' ' + ing.unit : '');
      } else {
        qty = ing.unit || '';
      }
      return `
        <div class="ing-item" onclick="this.classList.toggle('done')">
          <div class="ing-emoji">${ing.emoji}</div>
          <div class="ing-text">
            <div class="ing-name">${ing.name}</div>
            <div class="ing-qty">${qty}</div>
          </div>
        </div>`;
    }).join('');
  }

  function renderSteps() {
    document.getElementById('stepsList').innerHTML = recipe.steps.map((s, i) => `
      <div class="step-item" onclick="this.classList.toggle('done')">
        <div class="step-num">${i+1}</div>
        <div class="step-body">
          <div class="step-title">${s.title}</div>
          <div class="step-text">${s.text}</div>
          ${s.time ? `<div class="step-time">⏱ ${s.time}</div>` : ''}
        </div>
      </div>`).join('');
  }

  function renderTips() {
    document.getElementById('tipsBox').innerHTML = `
      <div class="tips-title">💡 Astuces</div>
      ${recipe.tips.map(t => `<div class="tip-item"><span>•</span><span>${t}</span></div>`).join('')}`;
  }

  // Buttons — simple and direct
  document.getElementById('btnPlus').onclick = () => {
    if (servings >= 10) return;
    servings++;
    document.getElementById('srvNum').textContent = servings;
    renderIngredients();
  };

  document.getElementById('btnMinus').onclick = () => {
    if (servings <= 1) return;
    servings--;
    document.getElementById('srvNum').textContent = servings;
    renderIngredients();
  };

  // ── ADD TO JOURNAL ────────────────────────────────────────────
  document.getElementById('addBtn').onclick = async () => {
    const { data:{ session } } = await sb.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }
    const loggedAt = new Date().toISOString();
    const { error } = await sb.from('consumption_logs').insert({
      user_id: session.user.id,
      product_name: foodName,
      nutrients: { sugar_g: recipe.nutri.sugar, salt_g: 0.3, fat_g: 5, protein_g: recipe.nutri.protein, energy_kcal: recipe.nutri.kcal },
      nova_score: 1,
      quantity_g: 200,
      source: 'recipe',
      logged_at: loggedAt,
      logged_date: loggedAt.slice(0,10),
    });
    if (error) { showToast('⚠️ Erreur — réessayez'); return; }
    showToast('✓ Ajouté au journal !');
    setTimeout(() => window.location.href = 'journal.html', 1500);
  };

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
